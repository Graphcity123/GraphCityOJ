{% extends 'oj/base.html' %}
{% block title %}题目列表 — GCOJ{% endblock %}
{% block content %}
<h2>题目列表</h2>
{% if not problems %}
<p class="empty">还没有题目。</p>
{% else %}
<div class="problem-grid">
    {% for p in problems %}
    <a href="{% url 'problem_detail' p.id %}" class="problem-card">
        <span class="prob-id">{{ p.id }}</span>
        <span class="prob-divider"></span>
        <span class="prob-title">{{ p.title }}</span>
    </a>
    {% endfor %}
</div>
{% endif %}

{% include 'oj/_pagination.html' %}
{% endblock %}
