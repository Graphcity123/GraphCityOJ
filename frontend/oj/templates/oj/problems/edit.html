{% extends 'oj/base.html' %}
{% block title %}编辑题目 — GCOJ{% endblock %}

{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center">
<h2 style="margin:0;border:none;padding:0">编辑题目：{{ problem.title }}</h2>
<a href="{% url 'problem_detail' folder_id %}" class="btn btn-sm">← 返回题目</a>
</div>

<form method="post" class="auth-form" style="max-width:600px;margin:0 auto">
    {% csrf_token %}
    <label>标题</label>
    <input type="text" name="title" value="{{ problem.title }}" required>

    <label>描述 (Markdown)</label>
    <textarea name="description" rows="14">{{ problem.description }}</textarea>

    <div>
        <div style="display:flex;gap:12px;margin-bottom:4px">
            <span style="flex:1;font-weight:600;font-size:.9rem">时间限制 (s)</span>
            <span style="flex:1;font-weight:600;font-size:.9rem">内存限制 (MB)</span>
        </div>
        <div style="display:flex;gap:12px">
            <input type="number" name="time_limit" value="{{ problem.time_limit }}" step="0.1" min="0.1" style="flex:1">
            <input type="number" name="memory_limit" value="{{ problem.memory_limit }}" min="16" style="flex:1">
        </div>
    </div>

    <label>难度</label>
    <select name="difficulty">
        <option value="beginner" {% if problem.difficulty == 'beginner' %}selected{% endif %}>beginner</option>
        <option value="easy" {% if problem.difficulty == 'easy' %}selected{% endif %}>easy</option>
        <option value="medium" {% if problem.difficulty == 'medium' %}selected{% endif %}>medium</option>
        <option value="hard" {% if problem.difficulty == 'hard' %}selected{% endif %}>hard</option>
        <option value="expert" {% if problem.difficulty == 'expert' %}selected{% endif %}>expert</option>
    </select>

    <button type="submit" class="btn btn-primary">保存修改</button>
</form>
{% endblock %}
